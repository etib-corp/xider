name: Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  LUNARG_VULKAN_SDK_BASE_URL: https://sdk.lunarg.com/sdk/download/
  LUNARG_VULKAN_SDK_VERSION: 1.4.341.1

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GLFW Linux
            engine-backend: glfw
            runner: ubuntu-latest
          - name: GLFW macOS
            engine-backend: glfw
            runner: macos-latest
          - name: GLFW Windows
            engine-backend: glfw
            runner: windows-latest
          - name: OpenXR Linux
            engine-backend: openxr
            runner: ubuntu-latest
          - name: OpenXR Windows
            engine-backend: openxr
            runner: windows-latest
    steps:
      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Install Ubuntu dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: bash scripts/install_ubuntu_dependencies.sh

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build -S ${{ github.workspace }}
          -DBUILD_FOR_GLFW=${{ matrix.engine-backend == 'glfw' }}
          -DBUILD_FOR_OPENXR=${{ matrix.engine-backend == 'openxr' }}

      - name: Build
        run: >
          cmake --build ${{ github.workspace }}/build
