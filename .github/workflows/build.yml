name: Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  LUNARG_VULKAN_SDK_VERSION: 1.4.304.1
  JAVA_TUMERIN_JDK_VERSION: 21

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GLFW Linux
            engine-backend: glfw
            operating-system: linux
            runner: ubuntu-latest
          - name: GLFW macOS
            engine-backend: glfw
            operating-system: macos
            runner: macos-latest
          - name: GLFW Windows
            engine-backend: glfw
            operating-system: windows
            runner: windows-latest
          - name: OpenXR Linux
            engine-backend: openxr
            operating-system: linux
            runner: ubuntu-latest
          - name: OpenXR Android
            engine-backend: openxr
            operating-system: android
            runner: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Install Ubuntu dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: bash scripts/install_ubuntu_dependencies.sh

      - name: Configure Vulkan SDK using the downloaded spec
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: ${{ env.LUNARG_VULKAN_SDK_VERSION }}
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Setup JDK
        if: matrix.operating-system == 'android'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_TUMERIN_JDK_VERSION }}

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build -S ${{ github.workspace }}
          -DBUILD_FOR_GLFW=${{ matrix.engine-backend == 'glfw' }}
          -DBUILD_FOR_OPENXR=${{ matrix.engine-backend == 'openxr' }}
          -DBUILD_FOR_LINUX=${{ matrix.operating-system == 'linux' }}
          -DBUILD_FOR_MACOS=${{ matrix.operating-system == 'macos' }}
          -DBUILD_FOR_WINDOWS=${{ matrix.operating-system == 'windows' }}
          -DBUILD_FOR_ANDROID=${{ matrix.operating-system == 'android' }}
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: >
          cmake --build ${{ github.workspace }}/build

      - name: Run code analysis
        if: matrix.runner == 'ubuntu-latest'
        id: coretrace
        uses: CoreTrace/coretrace-stack-analyzer@v0.14.0
        with:
          compile-commands: build/compile_commands.json
          analysis-profile: fast
          resource-model: default
          resource-cache-memory-only: "true"
          fail-on: error
          warnings-only: "false"
          json-file: artifacts/coretrace-stack-analysis-action.json
          sarif-file: artifacts/coretrace-stack-analysis-action.sarif
          upload-sarif: "false"

      - name: Upload SARIF to Code Scanning
        if: ${{ matrix.runner == 'ubuntu-latest' && hashFiles('artifacts/coretrace-stack-analysis-action.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: artifacts/coretrace-stack-analysis-action.sarif
          category: coretrace-consumer-action-tag

      - name: Upload analysis artifacts
        if: matrix.runner == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coretrace-results-action-tag
          path: artifacts/
          retention-days: 14

      - name: Print summary
        if: matrix.runner == 'ubuntu-latest'
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ['GITHUB_STEP_SUMMARY']
          json_path = Path('artifacts/coretrace-stack-analysis-action.json')

          errors = warnings = infos = 0
          notes = []

          if json_path.is_file():
            try:
              data = json.loads(json_path.read_text(encoding='utf-8'))
              diags = data.get('diagnostics', []) if isinstance(data, dict) else []
            except Exception as exc:
              diags = []
              notes.append(f'Failed to parse JSON report: {exc}')

            def sev(d):
              s = str(d.get('severity', d.get('level', d.get('details', {}).get('severity', '')))).upper()
              if s in {'2', 'ERROR'}:
                return 'ERROR'
              if s in {'1', 'WARNING', 'WARN'}:
                return 'WARNING'
              return 'INFO'

            errors = sum(1 for d in diags if sev(d) == 'ERROR')
            warnings = sum(1 for d in diags if sev(d) == 'WARNING')
            infos = sum(1 for d in diags if sev(d) == 'INFO')
          else:
            notes.append('JSON report not found (analysis step may have failed early).')

          print(f'errors={errors}')
          print(f'warnings={warnings}')
          print(f'infos={infos}')

          with open(summary_path, 'a', encoding='utf-8') as f:
            f.write('## CoreTrace Analysis Summary (Action Tag)\n\n')
            f.write('| Errors | Warnings | Info |\n')
            f.write('|--------|----------|------|\n')
            f.write(f'| {errors} | {warnings} | {infos} |\n\n')
            if notes:
              f.write('### Notes\n')
              for note in notes:
                f.write(f'- {note}\n')
          PY