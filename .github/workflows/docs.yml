name: Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  LUNARG_VULKAN_SDK_VERSION: 1.4.304.1
  JAVA_TUMERIN_JDK_VERSION: 21

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Install Doxygen
        run: sudo apt-get install doxygen graphviz -y

      - name: Configure CMake for only building documentation
        run: cmake -S . -B build -DBUILD_DOCS_ONLY=ON -DBUILD_ALL_DOCS=ON

      - name: Build documentation
        run: cmake --build build --target docs_all

      - name: Organize documentation for deployment
        run: |
          mkdir -p docs_deploy
          # Top-level project documentation to root
          cp -r build/docs/html/* docs_deploy/
          # Library documentation to respective directories
          cp -r build/libraries/evan/docs/html docs_deploy/evan
          cp -r build/libraries/guillaume/docs/html docs_deploy/guillaume
          cp -r build/libraries/utility/docs/html docs_deploy/utility
          cp -r build/libraries/xider/docs/html docs_deploy/xider

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-build
          path: docs_deploy

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs-build
          path: docs_deploy

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: "docs_deploy"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
